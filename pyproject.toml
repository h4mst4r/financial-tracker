[tool.ruff]
target-version = "py312"
line-length = 100
extend-exclude = ["venv", "frontend", "_bmad", "_bmad-output", ".agents", ".claude"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.ruff.lint.flake8-bugbear]
# FastAPI's DI idiom is `param = Depends(...)` in defaults — not a B008 mutable-default bug.
extend-immutable-calls = ["fastapi.Depends", "fastapi.Query", "fastapi.Path", "fastapi.Header"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["backend/tests"]
addopts = "--cov=backend --cov-report=term-missing"

[tool.coverage.run]
source = ["backend"]
omit = ["backend/tests/*"]

[tool.bandit]
exclude_dirs = ["venv", "frontend", "_bmad", "_bmad-output"]
# B101 (assert_used): asserts are the idiom for pytest assertions; tests never run
# under -O, so the "stripped in optimised bytecode" caveat does not apply.
skips = ["B101"]
